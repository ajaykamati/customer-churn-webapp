{% extends 'base.html' %}

{% block title %}Prediction Result{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg rounded-4 border-0 mt-4 text-center">
            <div class="card-header bg-light border-bottom-0 pt-4 pb-0">
                <h2 class="h5 text-muted text-uppercase fw-bold mb-0">Analysis Complete</h2>
            </div>
            <div class="card-body p-5">
                <div class="mb-4">
                    <i class="bi {{ icon }} display-1 {{ card_class.split(' ')[1] }} drop-shadow"></i>
                </div>

                <h3 class="{{ card_class }} fw-bold mb-3">{{ prediction_text }}</h3>

                {% if probability %}
                <div class="p-3 bg-light rounded-3 mt-4 mb-4">
                    <p class="mb-1 text-muted fw-bold">Estimated Churn Probability</p>
                    <h4 class="mb-0 text-dark">{{ probability }}</h4>
                </div>
                {% endif %}

                <div class="mt-5 d-grid gap-2 d-sm-flex justify-content-sm-center">
                    <a href="/predict_form" class="btn btn-primary px-4 shadow-sm">
                        <i class="bi bi-arrow-repeat me-2"></i>Analyze Another Customer
                    </a>
                    <a href="/" class="btn btn-outline-secondary px-4 shadow-sm">
                        <i class="bi bi-house-door me-2"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

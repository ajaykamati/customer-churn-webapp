{% extends 'base.html' %}

{% block title %}Predict Churn{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
        <div class="card shadow rounded-4 border-0 mb-5">
            <div class="card-header bg-primary text-white p-4 rounded-top-4">
                <h2 class="h4 mb-0"><i class="bi bi-person-lines-fill me-2"></i>Enter Customer Details</h2>
            </div>
            <div class="card-body p-4 p-md-5">
                <form action="/predict" method="POST">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="Customer_Age" class="form-label fw-bold">Customer Age</label>
                            <input type="number" class="form-control bg-light" id="Customer_Age" name="Customer_Age"
                                required min="18" max="100" placeholder="e.g. 45">
                        </div>

                        <div class="col-md-6">
                            <label for="Dependent_count" class="form-label fw-bold">Dependent Count</label>
                            <input type="number" class="form-control bg-light" id="Dependent_count"
                                name="Dependent_count" required min="0" max="10" placeholder="e.g. 2">
                        </div>

                        <div class="col-md-6">
                            <label for="Months_on_book" class="form-label fw-bold">Months on Book</label>
                            <input type="number" class="form-control bg-light" id="Months_on_book" name="Months_on_book"
                                required min="0" max="100" placeholder="e.g. 36">
                        </div>

                        <div class="col-md-6">
                            <label for="Total_Relationship_Count" class="form-label fw-bold">Total Relationship
                                Count</label>
                            <input type="number" class="form-control bg-light" id="Total_Relationship_Count"
                                name="Total_Relationship_Count" required min="1" max="10" placeholder="e.g. 4">
                        </div>

                        <div class="col-md-6">
                            <label for="Months_Inactive_12_mon" class="form-label fw-bold">Months Inactive (Last
                                12m)</label>
                            <input type="number" class="form-control bg-light" id="Months_Inactive_12_mon"
                                name="Months_Inactive_12_mon" required min="0" max="12" placeholder="e.g. 2">
                        </div>

                        <div class="col-md-6">
                            <label for="Contacts_Count_12_mon" class="form-label fw-bold">Contacts Count (Last
                                12m)</label>
                            <input type="number" class="form-control bg-light" id="Contacts_Count_12_mon"
                                name="Contacts_Count_12_mon" required min="0" max="15" placeholder="e.g. 3">
                        </div>

                        <div class="col-md-6">
                            <label for="Credit_Limit" class="form-label fw-bold">Credit Limit ($)</label>
                            <input type="number" step="0.01" class="form-control bg-light" id="Credit_Limit"
                                name="Credit_Limit" required placeholder="e.g. 5000">
                        </div>

                        <div class="col-md-6">
                            <label for="Total_Revolving_Bal" class="form-label fw-bold">Total Revolving Balance
                                ($)</label>
                            <input type="number" step="0.01" class="form-control bg-light" id="Total_Revolving_Bal"
                                name="Total_Revolving_Bal" required placeholder="e.g. 1500">
                        </div>

                        <div class="col-12">
                            <label for="Total_Trans_Amt" class="form-label fw-bold">Total Transaction Amount ($)</label>
                            <input type="number" step="0.01" class="form-control bg-light" id="Total_Trans_Amt"
                                name="Total_Trans_Amt" required placeholder="e.g. 12000">
                        </div>
                    </div>

                    <div class="mt-5 d-grid">
                        <button type="submit" class="btn btn-primary btn-lg shadow">
                            <i class="bi bi-cpu-fill me-2"></i>Analyze Customer Profile
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
